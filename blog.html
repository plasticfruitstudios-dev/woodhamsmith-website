<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog - Woodham Smith</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .blog-page { padding-top: 100px; padding-bottom: var(--spacing-3xl); background-color: var(--color-off-white); }
        .container { max-width: 1200px; margin: 0 auto; padding: 0 var(--spacing-lg); }
        .blog-hero h1 { font-size: var(--fs-h2); margin-bottom: var(--spacing-sm); }
        .blog-hero p { color: var(--color-medium-gray); }
        .footer-minimal { padding: var(--spacing-xl) var(--spacing-lg); text-align: center; background-color: transparent; }
        .footer-minimal-inner { max-width: 1400px; margin: 0 auto; }
        .social-icons { display: flex; justify-content: center; gap: var(--spacing-lg); }
        .social-icons a { display: inline-flex; width: 20px; height: 20px; color: var(--color-charcoal); transition: color var(--transition-normal); }
        .social-icons a:hover { color: var(--color-gold); }
        .social-icons svg { width: 100%; height: 100%; fill: currentColor; }
        .blog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 2rem;
            margin: 3rem 0;
        }

        .blog-card {
            background: white;
            border: 1px solid #e0e0e0;
            overflow: hidden;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            height: 100%;
        }

        .blog-card:hover {
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            transform: translateY(-4px);
        }

        .blog-card-image {
            width: 100%;
            height: 240px;
            object-fit: cover;
            background: #f5f5f5;
        }

        .blog-card-content {
            padding: 1.5rem;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .blog-card-date {
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            color: #999;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.5rem;
        }

        .blog-card-title {
            font-family: 'Cormorant Garamond', serif;
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 1rem;
            line-height: 1.3;
        }

        .blog-card-excerpt {
            font-family: 'Inter', sans-serif;
            font-size: 0.95rem;
            color: #666;
            line-height: 1.6;
            flex-grow: 1;
        }

        @media (max-width: 768px) {
            .blog-grid {
                grid-template-columns: 1fr;
                gap: 1.5rem;
            }
        }
    </style>
</head>

                <a href="${post.url}" class="blog-card" target="_blank" rel="noopener noreferrer">
                    <img src="${post.image}" alt="${post.title}" class="blog-card-image" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 width=%22300%22 height=%22240%22%3E%3Crect fill=%22%23f5f5f5%22 width=%22300%22 height=%22240%22/%3E%3C/svg%3E'">

                        <div class="blog-card-date">${post.date}</div>
                        <h2 class="blog-card-title">${post.title}</h2>
                        <p class="blog-card-excerpt">${post.excerpt}</p>
                    </div>
                </a>
            `).join('');
        }

        // Initialize
        document.addEventListener('DOMContentLoaded', renderBlogPosts);
