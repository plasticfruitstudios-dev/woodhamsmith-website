<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Woodham Smith - Fine Antiques & Decorative Arts by Thomas Woodham-Smith.">
    <title>Woodham Smith</title>
    <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .categories-section {
            padding: var(--spacing-xl) var(--spacing-lg);
            padding-top: calc(var(--spacing-xl) + 70px);
            background-color: var(--color-off-white);
            min-height: 100vh;
        }
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--spacing-lg);
            max-width: 1400px;
            margin: 0 auto;
        }
        .category-card {
            text-decoration: none;
            color: inherit;
            display: block;
        }
        .category-card img {
            width: 100%;
            aspect-ratio: 1/1;
            object-fit: cover;
            display: block;
            transition: opacity 0.3s ease;
        }
        .category-card:hover img {
            opacity: 0.85;
        }
        .category-card-title {
            font-family: var(--font-serif);
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            text-align: center;
            padding: var(--spacing-sm) 0;
            color: var(--color-charcoal);
        }

        @media (max-width: 768px) {
            .categories-grid { grid-template-columns: repeat(2, 1fr); gap: var(--spacing-sm); }
            .categories-section { padding: var(--spacing-lg) var(--spacing-sm); padding-top: calc(var(--spacing-lg) + 70px); }
        }
        @media (max-width: 480px) {
            .categories-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
